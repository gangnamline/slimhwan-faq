<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>슬림환 FAQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FFFFFF;
    --surface: #FFFFFF;
    --surface-soft: #FAFAFA;
    --surface-muted: #F5F5F5;
    --border: #E2E2E2;
    --border-strong: #CFCFCF;
    --text: #111111;
    --text-soft: #666666;
    --text-faint: #9A9A9A;
    --shadow-sm: 0 8px 24px rgba(17, 17, 17, 0.035);
    --shadow-md: 0 18px 42px rgba(17, 17, 17, 0.065);
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 22px;
    --max-width: 980px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Pretendard', 'Noto Sans KR', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.72;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .header-inner {
    max-width: var(--max-width);
    margin: 0 auto;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .brand-icon {
    width: 34px;
    height: 34px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .brand-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .brand-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
    white-space: nowrap;
  }

  .lang-switcher {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 6px;
  }

  .lang-btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-soft);
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
  }

  .lang-btn:hover {
    color: var(--text);
    border-color: var(--border-strong);
    background: var(--surface-soft);
    transform: translateY(-1px);
  }

  .lang-btn.active {
    color: #FFFFFF;
    background: var(--text);
    border-color: var(--text);
  }

  .hero {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 64px 24px 48px;
    text-align: center;
  }

  .hero-sub {
    display: inline-block;
    margin-bottom: 16px;
    padding: 8px 13px;
    border-radius: 999px;
    background: var(--text);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #FFFFFF;
  }

  .hero h1 {
    font-size: 2.15rem;
    line-height: 1.16;
    font-weight: 800;
    letter-spacing: -0.045em;
    color: var(--text);
    margin-bottom: 12px;
  }

  .hero-desc {
    max-width: 600px;
    margin: 0 auto;
    font-size: 15px;
    color: var(--text-soft);
  }

  .hero::after {
    content: '';
    display: block;
    width: 72px;
    height: 2px;
    margin: 24px auto 0;
    border-radius: 999px;
    background: var(--text);
    opacity: 0.95;
  }

  .category-bar {
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 24px;
  }

  .category-inner {
    max-width: var(--max-width);
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .category-inner::-webkit-scrollbar { display: none; }

  .cat-btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-soft);
    border-radius: 999px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    line-height: 1;
    white-space: nowrap;
    cursor: pointer;
    font-family: inherit;
    transition: background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
  }

  .cat-btn:hover {
    color: var(--text);
    background: var(--surface-soft);
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }

  .cat-btn.active {
    color: #FFFFFF;
    background: var(--text);
    border-color: var(--text);
  }

  .main {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 36px 24px 58px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 26px;
  }

  .search-wrap svg {
    position: absolute;
    top: 50%;
    left: 16px;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    stroke: var(--text-faint);
    fill: none;
    stroke-width: 2;
    pointer-events: none;
  }

  #search-input {
    width: 100%;
    height: 52px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--surface);
    color: var(--text);
    padding: 0 18px 0 46px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }

  #search-input::placeholder { color: var(--text-faint); }

  #search-input:focus {
    border-color: var(--text);
    box-shadow: 0 0 0 4px rgba(17, 17, 17, 0.05), var(--shadow-sm);
  }

  .section-label {
    margin-bottom: 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  .faq-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .faq-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
  }

  .faq-item:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }

  .faq-item.open {
    border-color: var(--text);
    box-shadow: var(--shadow-md);
  }

  .faq-q {
    width: 100%;
    border: none;
    background: transparent;
    padding: 20px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
  }

  .faq-num {
    width: 30px;
    min-width: 30px;
    height: 30px;
    border-radius: 10px;
    background: var(--surface-muted);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    line-height: 1;
  }

  .faq-item.open .faq-num {
    background: var(--text);
    color: #FFFFFF;
  }

  .faq-q-text {
    flex: 1;
    color: var(--text);
    font-size: 15px;
    line-height: 1.55;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .faq-chevron {
    width: 18px;
    height: 18px;
    stroke: var(--text-faint);
    fill: none;
    stroke-width: 2.3;
    transition: transform 0.24s ease, stroke 0.18s ease;
    flex-shrink: 0;
  }

  .faq-item.open .faq-chevron {
    transform: rotate(180deg);
    stroke: var(--text);
  }

  .faq-a {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.32s ease;
  }

  .faq-item.open .faq-a { max-height: 900px; }

  .faq-a-inner {
    border-top: 1px solid var(--border);
    padding: 16px 22px 22px 66px;
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.85;
  }

  .tip-box,
  .warn-box {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 12px;
    background: var(--surface-soft);
    border-left: 3px solid var(--text);
    color: var(--text-soft);
    font-size: 13px;
    line-height: 1.7;
  }

  .no-results {
    display: none;
    padding: 46px 16px;
    text-align: center;
    color: var(--text-faint);
    font-size: 14px;
  }

  .contact-section {
    border-top: 1px solid var(--border);
    background: var(--surface-soft);
    padding: 46px 24px 54px;
  }

  .contact-inner {
    max-width: var(--max-width);
    margin: 0 auto;
  }

  .contact-header {
    text-align: center;
    margin-bottom: 26px;
  }

  .contact-title {
    font-size: 20px;
    line-height: 1.3;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 10px;
  }

  .contact-desc {
    max-width: 620px;
    margin: 0 auto;
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.8;
  }

  .contact-cards {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
  }

  .contact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px 16px 18px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    min-height: 100%;
    box-shadow: var(--shadow-sm);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }

  .contact-card:hover {
    transform: translateY(-2px);
    border-color: var(--border-strong);
    box-shadow: var(--shadow-md);
  }

  .contact-card-label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 94px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--text);
    background: var(--text);
    color: #FFFFFF;
    font-size: 12px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .contact-qr-wrap {
    width: 176px;
    height: 176px;
    padding: 10px;
    border-radius: 18px;
    background: #FFFFFF;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .contact-qr {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    border-radius: 12px;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    background: #FFFFFF;
  }

  .contact-scan-text {
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text-soft);
  }

  footer {
    border-top: 1px solid var(--border);
    background: #FFFFFF;
    text-align: center;
    padding: 22px 24px;
    color: var(--text-soft);
    font-size: 12px;
    line-height: 1.8;
  }

  footer strong {
    color: var(--text);
    font-weight: 700;
  }

  @media (max-width: 860px) {
    .contact-cards { grid-template-columns: 1fr; }
    .contact-card { padding: 18px 16px 16px; }
  }

  @media (max-width: 640px) {
    header, .category-bar, .hero, .main, .contact-section { padding-left: 16px; padding-right: 16px; }
    .header-inner { height: 66px; gap: 12px; }
    .brand-icon { width: 30px; height: 30px; }
    .brand-name { font-size: 14px; }
    .lang-btn { padding: 7px 10px; font-size: 11px; }
    .hero { padding-top: 42px; padding-bottom: 36px; }
    .hero h1 { font-size: 1.76rem; }
    .hero-desc { font-size: 14px; }
    .category-inner { gap: 6px; padding: 10px 0; }
    .cat-btn { padding: 9px 13px; font-size: 12px; }
    .main { padding-top: 28px; padding-bottom: 46px; }
    #search-input { height: 48px; border-radius: 14px; }
    .faq-q { padding: 18px 18px; }
    .faq-q-text { font-size: 14px; }
    .faq-a-inner { padding: 14px 18px 18px 18px; }
    .contact-title { font-size: 18px; }
    .contact-qr-wrap { width: min(100%, 176px); height: min(100%, 176px); }
    .contact-scan-text { font-size: 12px; }
    footer { padding: 20px 16px; }
  }

</style>
</head>

let currentLang = 'ko';
let currentCat = 'all';
let currentSearch = '';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (I18N[lang][key]) el.placeholder = I18N[lang][key];
  });
  renderFAQs();
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderFAQs();
}

function filterSearch(val) {
  currentSearch = val.toLowerCase();
  renderFAQs();
}

function renderFAQs() {
  const list = document.getElementById('faq-list');
  const noRes = document.getElementById('no-results');
  list.innerHTML = '';

  const filtered = FAQS.filter(faq => {
    const catMatch = currentCat === 'all' || faq.cat === currentCat;
    const searchMatch = !currentSearch ||
      faq.q[currentLang].toLowerCase().includes(currentSearch) ||
      faq.a[currentLang].toLowerCase().includes(currentSearch);
    return catMatch && searchMatch;
  });

  if (filtered.length === 0) {
    noRes.style.display = 'block';
    noRes.textContent = I18N[currentLang].no_results;
    return;
  }
  noRes.style.display = 'none';

  filtered.forEach(faq => {
    const item = document.createElement('div');
    item.className = 'faq-item';
    item.dataset.id = faq.id;

    const tipHtml = faq.tip
      ? `<div class="tip-box">${faq.tip[currentLang]}</div>`
      : '';
    const warnHtml = faq.warn
      ? `<div class="warn-box">${faq.warn[currentLang]}</div>`
      : '';

    item.innerHTML = `
      <button class="faq-q" onclick="toggleFAQ(${faq.id})">
        <span class="faq-num">${faq.id}</span>
        <span class="faq-q-text">${faq.q[currentLang]}</span>
        <svg class="faq-chevron" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="faq-a">
        <div class="faq-a-inner">
          <p>${faq.a[currentLang]}</p>
          ${tipHtml}${warnHtml}
        </div>
      </div>
    `;
    list.appendChild(item);
  });
}

function toggleFAQ(id) {
  const item = document.querySelector(`.faq-item[data-id="${id}"]`);
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(el => el.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}

renderFAQs();
