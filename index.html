<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>슬림환 FAQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>

  :root {
    --sage: #1a1a1a;
    --sage-light: #555555;
    --sage-pale: #f0f0f0;
    --cream: #f7f7f7;
    --warm-white: #ffffff;
    --charcoal: #111111;
    --mid: #555555;
    --light: #999999;
    --border: #e0e0e0;
    --accent: #111111;
    --error: #d32f2f;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--charcoal);
    font-family: 'Pretendard', 'Noto Sans KR', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
    line-height: 1.7;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ── Header: matched with consultation form ── */
  .header {
    background: #ffffff;
    padding: 48px 20px 36px;
    text-align: center;
    position: relative;
    border-bottom: 1px solid var(--border);
  }
  .header-logo {
    font-family: 'Pretendard', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #999999;
    margin-bottom: 14px;
  }
  .header-title {
    font-family: 'Pretendard', sans-serif;
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 300;
    font-style: normal;
    color: #111111;
    line-height: 1.2;
    letter-spacing: -0.02em;
  }
  .header-sub {
    margin-top: 10px;
    font-size: 12px;
    font-weight: 400;
    color: #999999;
    letter-spacing: 0.8px;
  }

  /* ── Language Selector ── */
  .lang-bar {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .lang-btn {
    padding: 7px 16px;
    border-radius: 30px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-size: 12px;
    font-family: 'Pretendard', sans-serif;
    color: var(--mid);
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .3px;
    font-weight: 400;
  }
  .lang-btn:hover { border-color: var(--sage); color: var(--sage); }
  .lang-btn.active {
    background: var(--sage);
    border-color: var(--sage);
    color: #fff;
    font-weight: 500;
  }

  /* ── Category Bar ── */
  .category-bar {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
  }
  .category-inner {
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .cat-btn {
    padding: 7px 16px;
    border-radius: 30px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-size: 12px;
    font-family: 'Pretendard', sans-serif;
    color: var(--mid);
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .3px;
    font-weight: 400;
    white-space: nowrap;
  }
  .cat-btn:hover { border-color: var(--sage); color: var(--sage); }
  .cat-btn.active {
    background: var(--sage);
    border-color: var(--sage);
    color: #fff;
    font-weight: 500;
  }

  /* ── Main Container ── */
  .main {
    max-width: 700px;
    margin: 36px auto 44px;
    padding: 0 20px;
  }

  /* ── Search ── */
  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .search-wrap svg {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    width: 17px;
    height: 17px;
    stroke: var(--light);
    fill: none;
    stroke-width: 2;
    pointer-events: none;
  }
  #search-input {
    width: 100%;
    padding: 11px 15px 11px 42px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--warm-white);
    font-size: 14px;
    font-family: 'Pretendard', sans-serif;
    color: var(--charcoal);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
    -webkit-appearance: none;
  }
  #search-input:focus {
    border-color: var(--sage);
    box-shadow: 0 0 0 3px rgba(17,17,17,.08);
    background: var(--warm-white);
  }
  #search-input::placeholder { color: var(--light); }

  /* ── FAQ Cards ── */
  .faq-list { display: flex; flex-direction: column; gap: 16px; }
  .faq-item {
    background: var(--warm-white);
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  .faq-q {
    width: 100%;
    border: none;
    background: transparent;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 22px;
    text-align: left;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
  }
  .faq-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    min-width: 20px;
    height: 20px;
    background: #111111;
    color: #ffffff;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 500;
    font-family: 'Pretendard', sans-serif;
  }
  .faq-q-text {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: var(--charcoal);
    line-height: 1.55;
    letter-spacing: .1px;
  }
  .faq-chevron {
    width: 18px;
    height: 18px;
    stroke: var(--light);
    fill: none;
    stroke-width: 2;
    transition: transform .25s;
    flex-shrink: 0;
  }
  .faq-item.open .faq-chevron { transform: rotate(180deg); stroke: var(--sage); }
  .faq-a { max-height: 0; overflow: hidden; transition: max-height .32s ease; }
  .faq-item.open .faq-a { max-height: 900px; }
  .faq-a-inner {
    padding: 0 22px 22px 52px;
    font-size: 13.5px;
    color: var(--mid);
    line-height: 1.85;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }
  .tip-box,
  .warn-box {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    font-size: 12.5px;
    color: var(--mid);
    line-height: 1.7;
    margin-top: 12px;
  }

  /* ── No Results ── */
  .no-results {
    text-align: center;
    padding: 42px 16px;
    color: var(--light);
    font-size: 14px;
    display: none;
  }

  /* ── Contact QR ── */
  .contact-section {
    max-width: 700px;
    margin: 0 auto 60px;
    padding: 0 20px;
  }
  .contact-inner {
    background: var(--warm-white);
    border-radius: 10px;
    border: 1px solid var(--border);
    padding: 24px;
  }
  .contact-header {
    text-align: center;
    margin-bottom: 22px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .contact-title {
    font-family: 'Pretendard', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: #999999;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .contact-desc {
    font-size: 13px;
    color: var(--mid);
    line-height: 1.7;
  }
  .contact-cards {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
  }
  .contact-card {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
  }
  .contact-card-label {
    padding: 7px 14px;
    border-radius: 30px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-size: 12px;
    color: var(--mid);
    font-weight: 400;
    letter-spacing: .3px;
  }
  .contact-qr-wrap {
    width: 150px;
    height: 150px;
    border-radius: 8px;
    background: #ffffff;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
  }
  .contact-qr {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    border-radius: 6px;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
  }
  .contact-scan-text {
    font-size: 12px;
    color: var(--mid);
    line-height: 1.6;
  }

  /* ── Footer ── */
  footer {
    background: #ffffff;
    color: var(--mid);
    text-align: center;
    padding: 22px 20px;
    font-size: 12px;
    line-height: 1.8;
    border-top: 1px solid var(--border);
  }
  footer strong { color: var(--charcoal); font-weight: 500; }

  @media(max-width: 640px) {
    .header { padding: 42px 18px 32px; }
    .header-logo { letter-spacing: 5px; }
    .main { margin-top: 28px; padding: 0 16px; }
    .category-bar, .lang-bar { padding-left: 16px; padding-right: 16px; }
    .faq-q { padding: 18px 18px; align-items: flex-start; }
    .faq-a-inner { padding: 14px 18px 18px 18px; }
    .contact-section { padding: 0 16px; }
    .contact-inner { padding: 22px 18px; }
    .contact-cards { grid-template-columns: 1fr; }
    .contact-qr-wrap { width: 160px; height: 160px; }
  }

</style>
</head>
<body>

<header class="header">
  <div class="header-logo">LINE CLINIC</div>
  <div class="header-title" data-i18n="hero_title">슬림환 FAQ</div>
  <div class="header-sub" data-i18n="hero_desc">슬림환 복용 중 궁금하신 점을 아래에서 확인하세요.</div>
</header>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('ko')">🇰🇷 한국어</button>
  <button class="lang-btn" onclick="setLang('en')">🇬🇧 English</button>
  <button class="lang-btn" onclick="setLang('id')">🇮🇩 Indonesia</button>
  <button class="lang-btn" onclick="setLang('ja')">🇯🇵 日本語</button>
  <button class="lang-btn" onclick="setLang('zh')">🇨🇳 中文</button>
  <button class="lang-btn" onclick="setLang('th')">🇹🇭 ภาษาไทย</button>

</div>

<div class="category-bar">

    <button class="cat-btn" onclick="filterCat('sideeffect')" data-i18n="cat_side">부작용</button>
    <button class="cat-btn" onclick="filterCat('safety')" data-i18n="cat_safety">주의사항</button>
    <button class="cat-btn" onclick="filterCat('lifestyle')" data-i18n="cat_lifestyle">생활습관</button>
  </div>
</div>

<main class="main">

    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

    <input type="text" id="search-input" data-i18n-placeholder="search_placeholder" placeholder="질문 검색..." oninput="filterSearch(this.value)">

  <div class="no-results" id="no-results" data-i18n="no_results">검색 결과가 없습니다.</div>

let currentLang = 'ko';
let currentCat = 'all';
let currentSearch = '';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (I18N[lang][key]) el.placeholder = I18N[lang][key];
  });
  renderFAQs();
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderFAQs();
}

function filterSearch(val) {
  currentSearch = val.toLowerCase();
  renderFAQs();
}

function renderFAQs() {
  const list = document.getElementById('faq-list');
  const noRes = document.getElementById('no-results');
  list.innerHTML = '';

  const filtered = FAQS.filter(faq => {
    const catMatch = currentCat === 'all' || faq.cat === currentCat;
    const searchMatch = !currentSearch ||
      faq.q[currentLang].toLowerCase().includes(currentSearch) ||
      faq.a[currentLang].toLowerCase().includes(currentSearch);
    return catMatch && searchMatch;
  });

  if (filtered.length === 0) {
    noRes.style.display = 'block';
    noRes.textContent = I18N[currentLang].no_results;
    return;
  }
  noRes.style.display = 'none';

  filtered.forEach(faq => {
    const item = document.createElement('div');
    item.className = 'faq-item';
    item.dataset.id = faq.id;

    const tipHtml = faq.tip
      ? `<div class="tip-box">${faq.tip[currentLang]}</div>`
      : '';
    const warnHtml = faq.warn
      ? `<div class="warn-box">${faq.warn[currentLang]}</div>`
      : '';

    item.innerHTML = `
      <button class="faq-q" onclick="toggleFAQ(${faq.id})">
        <span class="faq-num">${faq.id}</span>
        <span class="faq-q-text">${faq.q[currentLang]}</span>
        <svg class="faq-chevron" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="faq-a">
        <div class="faq-a-inner">
          <p>${faq.a[currentLang]}</p>
          ${tipHtml}${warnHtml}
        </div>
      </div>
    `;
    list.appendChild(item);
  });
}

function toggleFAQ(id) {
  const item = document.querySelector(`.faq-item[data-id="${id}"]`);
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(el => el.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}

renderFAQs();
</script>
