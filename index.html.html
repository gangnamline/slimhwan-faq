<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>슬림환 FAQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+Thai:wght@300;400;500;700&family=Noto+Sans:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-50: #EAF3DE;
    --green-100: #C0DD97;
    --green-200: #97C459;
    --green-500: #4a8a18;
    --green-600: #3B6D11;
    --green-800: #27500A;
    --green-900: #173404;
    --teal-50: #E1F5EE;
    --teal-100: #9FE1CB;
    --teal-500: #1D9E75;
    --teal-600: #0F6E56;
    --gray-50: #F8F8F5;
    --gray-100: #F1EFE8;
    --gray-200: #D3D1C7;
    --gray-400: #888780;
    --gray-600: #5F5E5A;
    --gray-800: #2C2C2A;
    --amber-50: #FAEEDA;
    --amber-600: #854F0B;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans KR', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans Thai', 'Noto Sans', sans-serif;
    background: #FAFAF7;
    color: var(--gray-800);
    line-height: 1.7;
    font-weight: 400;
  }

  /* HEADER */
  header {
    background: white;
    border-bottom: 1px solid var(--gray-200);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 2rem;
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 1rem;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-icon {
    width: 36px;
    height: 36px;
    background: var(--green-600);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .brand-icon svg { width: 20px; height: 20px; fill: white; }

  .brand-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--green-800);
    letter-spacing: -0.3px;
  }

  /* LANGUAGE SWITCHER */
  .lang-switcher {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .lang-btn {
    padding: 5px 10px;
    border: 1px solid var(--gray-200);
    background: transparent;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-600);
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: inherit;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .lang-btn .flag { font-size: 16px; line-height: 1; }
  .lang-btn .lang-name { font-size: 11px; font-weight: 600; }

  .lang-btn:hover {
    border-color: var(--green-600);
    color: var(--green-600);
    background: var(--green-50);
  }

  .lang-btn.active {
    background: var(--green-600);
    border-color: var(--green-600);
    color: white;
  }

  .clickable-qr {
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .clickable-qr:hover {
    transform: scale(1.04);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  @media (max-width: 480px) {
    .lang-btn .lang-name { display: none; }
    .lang-btn { padding: 5px 8px; }
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--green-800) 0%, var(--green-600) 100%);
    padding: 3.5rem 2rem 3rem;
    text-align: center;
  }

  .hero-sub {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green-100);
    margin-bottom: 0.75rem;
  }

  .hero h1 {
    font-size: 2rem;
    font-weight: 700;
    color: white;
    margin-bottom: 0.75rem;
    letter-spacing: -0.5px;
  }

  .hero-desc {
    font-size: 15px;
    color: rgba(255,255,255,0.75);
    max-width: 480px;
    margin: 0 auto 1.5rem;
  }

  /* CATEGORY PILLS */
  .category-bar {
    background: white;
    border-bottom: 1px solid var(--gray-200);
    padding: 0 2rem;
    overflow-x: auto;
  }

  .category-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    gap: 0;
  }

  .cat-btn {
    padding: 14px 18px;
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-600);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.18s ease;
    font-family: inherit;
  }

  .cat-btn:hover { color: var(--green-600); }
  .cat-btn.active { color: var(--green-600); border-bottom-color: var(--green-600); }

  /* MAIN CONTENT */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2.5rem 2rem 4rem;
  }

  /* SEARCH */
  .search-wrap {
    margin-bottom: 2rem;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    stroke: var(--gray-400);
    fill: none;
    stroke-width: 2;
    pointer-events: none;
  }

  #search-input {
    width: 100%;
    padding: 12px 16px 12px 42px;
    border: 1.5px solid var(--gray-200);
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    background: white;
    color: var(--gray-800);
    outline: none;
    transition: border-color 0.18s;
  }

  #search-input:focus { border-color: var(--green-500); }
  #search-input::placeholder { color: var(--gray-400); }

  /* SECTION HEADING */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green-600);
    margin-bottom: 1rem;
  }

  /* FAQ ITEMS */
  .faq-list { display: flex; flex-direction: column; gap: 8px; }

  .faq-item {
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.18s, box-shadow 0.18s;
  }

  .faq-item:hover { border-color: var(--green-100); }
  .faq-item.open { border-color: var(--green-200); box-shadow: 0 2px 12px rgba(59,109,17,0.08); }

  .faq-q {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 20px;
    cursor: pointer;
    user-select: none;
    background: transparent;
    border: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }

  .faq-num {
    min-width: 28px;
    height: 28px;
    background: var(--green-50);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--green-600);
  }

  .faq-item.open .faq-num {
    background: var(--green-600);
    color: white;
  }

  .faq-q-text {
    flex: 1;
    font-size: 14.5px;
    font-weight: 500;
    color: var(--gray-800);
    line-height: 1.5;
  }

  .faq-chevron {
    width: 18px;
    height: 18px;
    stroke: var(--gray-400);
    fill: none;
    stroke-width: 2.5;
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }

  .faq-item.open .faq-chevron { transform: rotate(180deg); stroke: var(--green-600); }

  .faq-a {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, padding 0.2s;
  }

  .faq-item.open .faq-a { max-height: 600px; }

  .faq-a-inner {
    padding: 0 20px 20px 62px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--gray-600);
    border-top: 1px solid var(--gray-100);
    padding-top: 16px;
  }

  .tip-box {
    margin-top: 10px;
    background: var(--green-50);
    border-left: 3px solid var(--green-500);
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--green-800);
    line-height: 1.7;
  }

  .warn-box {
    margin-top: 10px;
    background: var(--amber-50);
    border-left: 3px solid #EF9F27;
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--amber-600);
    line-height: 1.7;
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--gray-400);
    font-size: 14px;
    display: none;
  }

  /* FOOTER */
  footer {
    background: var(--green-900);
    color: rgba(255,255,255,0.5);
    text-align: center;
    padding: 2rem;
    font-size: 12px;
  }

  footer strong { color: rgba(255,255,255,0.8); }

  @media (max-width: 600px) {
    .hero h1 { font-size: 1.5rem; }
    .main { padding: 1.5rem 1rem 3rem; }
    .faq-a-inner { padding-left: 20px; }
    .brand-name { font-size: 15px; }
  }

  /* CONTACT SECTION */
  .contact-section {
    background: white;
    border-top: 1px solid var(--gray-200);
    padding: 2.5rem 2rem;
  }

  .contact-inner {
    max-width: 900px;
    margin: 0 auto;
  }

  .contact-header {
    text-align: center;
    margin-bottom: 1.75rem;
  }

  .contact-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--green-800);
    margin-bottom: 0.5rem;
  }

  .contact-desc {
    font-size: 14px;
    color: var(--gray-600);
    line-height: 1.7;
    max-width: 580px;
    margin: 0 auto;
  }

  .contact-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }

  .contact-card {
    border: 1px solid var(--gray-200);
    border-radius: 14px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
  }

  .contact-card.line-card { border-color: #06C755; background: #f0fff6; }
  .contact-card.kakao-card { border-color: #FAE100; background: #FFFDE7; }

  .contact-card-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .line-card .contact-card-label { color: #06C755; }
  .kakao-card .contact-card-label { color: #936A00; }

  .contact-qr {
    width: 140px;
    height: 140px;
    border-radius: 10px;
    object-fit: cover;
    border: 1px solid rgba(0,0,0,0.08);
  }

  .contact-scan-text {
    font-size: 13px;
    color: var(--gray-600);
  }

  .kakao-id-box {
    background: #FAE100;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 20px;
    font-weight: 700;
    color: #3A2E00;
    letter-spacing: 1px;
  }

  .line-id-box {
    background: #06C755;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 20px;
    font-weight: 700;
    color: white;
    letter-spacing: 1px;
  }

  .kakao-icon {
    width: 52px;
    height: 52px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.5 2 5 5.5 5 10c0 5 7 12 7 12s7-7 7-12c0-4.5-3.5-8-7-8zm0 10.5c-1.4 0-2.5-1.1-2.5-2.5S10.6 7.5 12 7.5s2.5 1.1 2.5 2.5S13.4 12.5 12 12.5z"/>
        </svg>
      </div>
      <span class="brand-name" data-i18n="brand">슬림환 FAQ</span>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('ko', this)" data-lang="ko"><span class="flag">🇰🇷</span><span class="lang-name">한국어</span></button>
      <button class="lang-btn" onclick="setLang('en', this)" data-lang="en"><span class="flag">🇺🇸</span><span class="lang-name">English</span></button>
      <button class="lang-btn" onclick="setLang('id', this)" data-lang="id"><span class="flag">🇮🇩</span><span class="lang-name">Indonesia</span></button>
      <button class="lang-btn" onclick="setLang('ja', this)" data-lang="ja"><span class="flag">🇯🇵</span><span class="lang-name">日本語</span></button>
      <button class="lang-btn" onclick="setLang('zh', this)" data-lang="zh"><span class="flag">🇨🇳</span><span class="lang-name">中文</span></button>
      <button class="lang-btn" onclick="setLang('th', this)" data-lang="th"><span class="flag">🇹🇭</span><span class="lang-name">ภาษาไทย</span></button>
      <button class="lang-btn" onclick="setLang('vi', this)" data-lang="vi"><span class="flag">🇻🇳</span><span class="lang-name">Tiếng Việt</span></button>
    </div>
  </div>
</header>

<div class="hero">
  <p class="hero-sub" data-i18n="hero_sub">자주 묻는 질문</p>
  <h1 data-i18n="hero_title">슬림환 복용 안내</h1>
  <p class="hero-desc" data-i18n="hero_desc">슬림환 복용 중 궁금하신 점을 아래에서 확인하세요.</p>
</div>

<div class="category-bar">
  <div class="category-inner">
    <button class="cat-btn active" onclick="filterCat('all')" data-i18n="cat_all">전체</button>
    <button class="cat-btn" onclick="filterCat('dosage')" data-i18n="cat_dosage">복용법</button>
    <button class="cat-btn" onclick="filterCat('sideeffect')" data-i18n="cat_side">부작용</button>
    <button class="cat-btn" onclick="filterCat('safety')" data-i18n="cat_safety">주의사항</button>
    <button class="cat-btn" onclick="filterCat('lifestyle')" data-i18n="cat_lifestyle">생활습관</button>
  </div>
</div>

<main class="main">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search-input" data-i18n-placeholder="search_placeholder" placeholder="질문 검색..." oninput="filterSearch(this.value)">
  </div>

  <div id="faq-list" class="faq-list"></div>
  <div class="no-results" id="no-results" data-i18n="no_results">검색 결과가 없습니다.</div>
</main>


<section class="contact-section" id="contact-section">
  <div class="contact-inner">
    <div class="contact-header">
      <div class="contact-title" data-i18n="contact_title">1:1 상담 문의</div>
      <p class="contact-desc" data-i18n="contact_desc">슬림환 복용 중 궁금하거나 불편한 점이 있으시면 아래 채널로 문의주시면 원장님과 1:1 상담이 가능합니다.</p>
    </div>

let currentLang = 'ko';
let currentCat = 'all';
let currentSearch = '';

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (I18N[lang][key]) el.placeholder = I18N[lang][key];
  });
  renderFAQs();
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderFAQs();
}

function filterSearch(val) {
  currentSearch = val.toLowerCase();
  renderFAQs();
}

function renderFAQs() {
  const list = document.getElementById('faq-list');
  const noRes = document.getElementById('no-results');
  list.innerHTML = '';

  const filtered = FAQS.filter(faq => {
    const catMatch = currentCat === 'all' || faq.cat === currentCat;
    const searchMatch = !currentSearch ||
      faq.q[currentLang].toLowerCase().includes(currentSearch) ||
      faq.a[currentLang].toLowerCase().includes(currentSearch);
    return catMatch && searchMatch;
  });

  if (filtered.length === 0) {
    noRes.style.display = 'block';
    noRes.textContent = I18N[currentLang].no_results;
    return;
  }
  noRes.style.display = 'none';

  filtered.forEach(faq => {
    const item = document.createElement('div');
    item.className = 'faq-item';
    item.dataset.id = faq.id;

    const tipHtml = faq.tip
      ? `<div class="tip-box">${faq.tip[currentLang]}</div>`
      : '';
    const warnHtml = faq.warn
      ? `<div class="warn-box">${faq.warn[currentLang]}</div>`
      : '';

    item.innerHTML = `
      <button class="faq-q" onclick="toggleFAQ(${faq.id})">
        <span class="faq-num">${faq.id}</span>
        <span class="faq-q-text">${faq.q[currentLang]}</span>
        <svg class="faq-chevron" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="faq-a">
        <div class="faq-a-inner">
          <p>${faq.a[currentLang]}</p>
          ${tipHtml}${warnHtml}
        </div>
      </div>
    `;
    list.appendChild(item);
  });
}

function toggleFAQ(id) {
  const item = document.querySelector(`.faq-item[data-id="${id}"]`);
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(el => el.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}

renderFAQs();
</script>
